name: CycleScan — Hourly Data Collector

on:
  schedule:
    # Every hour at minute 0
    - cron: '0 * * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push history.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        run: node collect.js

      - name: Commit and push history.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CycleScan Bot"
          git add data/history.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "📊 Data update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
